version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
  - package-ecosystem: gomod
    directory: relay_forwarder/
    schedule:
      interval: weekly
    groups:
      all:
        patterns:
          - "*"
    commit-message:
      prefix: chore
